<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soal 1</title>
    <style>
        table {
            border-collapse: collapse;
            margin: 50px auto;
            border: 2px solid black;
        }

        td {
            width: 50px;
            height: 50px;
            text-align: center;
            vertical-align: middle;
            font-size: 15px;
        }

        .blue {
            background-color: blue;
            color: white;
        }

        .red {
            background-color: red;
            color: white;
        }

        .green {
            background-color: limegreen;
            color: black;
        }

        .yellow {
            background-color: yellow;
            color: black;
        }

        .black {
            background-color: black;
            color: white;
        }
    </style>
</head>
<body>
    <table>
        <tr>
            <td colspan="3" class="blue">A</td>
            <td rowspan="7" class="yellow">D</td>
        </tr>
        <tr>
            <td colspan="2" class="red">B</td>
            <td rowspan="2" class="green">C</td>
        </tr>
        <tr>
            <td class="black">X</td>
        </tr>
        <tr>
            <td rowspan="5" class="yellow">G</td>
            <td rowspan="2"class="green">F</td>
            <td  colspan="2"class="red">E</td>
        </tr>
        <tr>
            <td colspan="3" class="blue">H</td>
        </tr>
    </table>
</body>
</html>
